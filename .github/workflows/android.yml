name: Android CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Sube el heap de Gradle SOLO en CI (evita "GC garbage collector is thrashing"
      # al compilar Compose + KSP). No se toca el gradle.properties del repo.
      - name: Configure Gradle heap (CI)
        run: echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" >> gradle.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/release.jks

      - name: Build signed release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_FILE: keystore/release.jks
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p dist
          REF="${{ github.ref_name }}"
          cp app/build/outputs/apk/debug/app-debug.apk "dist/OpenCallShield-${REF}-debug.apk"
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk "dist/OpenCallShield-${REF}-release.apk"
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenCallShield-apks
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenCallShield ${{ github.ref_name }}
          files: dist/*.apk
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
